services:
  - type: web
    name: lemod-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: LEMOD_ADMIN_KEY
        value: lemod-admin-secret
      - key: ADMIN_EMAIL
        value: adminmm@gmail.com
      - key: ADMIN_PASSWORD
        value: karoxkarox
